<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0a0d10"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g1)"/>

  <!-- 8x8 chess pattern subtle -->
  <g opacity="0.04">
    <rect x="0" y="0" width="100" height="100" fill="white"/>
    <rect x="200" y="0" width="100" height="100" fill="white"/>
    <rect x="400" y="0" width="100" height="100" fill="white"/>
    <rect x="600" y="0" width="100" height="100" fill="white"/>
    <rect x="100" y="100" width="100" height="100" fill="white"/>
    <rect x="300" y="100" width="100" height="100" fill="white"/>
    <rect x="500" y="100" width="100" height="100" fill="white"/>
    <rect x="700" y="100" width="100" height="100" fill="white"/>
  </g>

  <!-- Pawn icon -->
  <g transform="translate(330, 130)">
    <text font-family="Georgia, serif" font-size="240" fill="rgba(52,211,153,0.5)">♟</text>
  </g>

  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="500" fill="white" letter-spacing="1">
    Эхлэгчийн зам
  </text>
</svg>
